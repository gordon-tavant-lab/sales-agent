# roster.yml — capability manifest for tvt-sales-agent's dispatcher (dispatch.py)
#
# Each entry is one capability the dispatcher can route a request to. `invokes` names the
# vendored skill (skills/<name>/, see VENDORED_FROM.md) the Agent tool wraps with a thin
# prompt (plan.md §2). `trigger_patterns` are Tier-1 deterministic keyword/regex matches
# (plan.md §1.1) — case-insensitive substring match on the incoming request. `depends_on`
# encodes job sequencing for multi-job requests (plan.md §1.2) — the direct data encoding
# of spec006 §3's spine order. `outward_facing: false` for every entry below: nothing in
# this roster sends, posts, or transmits anything — all of it is draft/research/analysis
# output, per the "AI drafts, human sends" guardrail (spec006 §7, spec008 FR-009/FR-010).

config:
  promotion_threshold: 3          # invocation count that triggers a promotion suggestion (FR-007)
  promotion_rejection_multiplier: 2   # re-surface only once count reaches rejected_at_count * this

capabilities:

  # --- Intel family (9) ---
  - capability_slug: account-research-deep
    invokes: tvt-intel-deep
    jtbd_step: S2
    trigger_patterns: ["research", "deep dive", "build intel on", "what do we know about", "prep for a first meeting"]
    depends_on: []
    outward_facing: false

  - capability_slug: account-research-customer
